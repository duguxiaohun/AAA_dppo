defaults:
  - ft_ppo_diffusion_mlp
  - _self_

# 仅评估，不训练
_target_: agent.eval_ppo_diffusion_agent.EvalPPODiffusionAgent

# 可在命令行覆盖：carla_env_interface=CarlaTown05Cross-v0 / CarlaTown10Cross-v0 / carlaenv10-v0
carla_env_interface: CarlaTown05Cross-v0
env_name: ${carla_env_interface}

wandb:
  entity: 1150900229-
  project: gym-${env_name}-eval
  run: CarlaTown05_latestPerRun_eval

eval:
  agent_target: agent.eval_ppo_diffusion_agent.EvalPPODiffusionAgent

  # 每次只传一个 checkpoint 目录（外部覆盖这个参数即可）
  # 例如：.../2026-05-22_14-36-16_42/checkpoint
  checkpoint_dir: ${hydra:runtime.cwd}/logs/gym-finetune/CarlaTown05Cross-v0_ppo_diffusion_mlp_ta1_td20_tdf20/2026-05-22_14-36-16_42/checkpoint
  checkpoint_pattern: state_*.pt

  # 可选：指定 step；-1 表示自动取目录里最后一个 ckpt
  checkpoint_step: -1

  # 每个ckpt评估回合数（你可改）
  episodes_per_checkpoint: 500
  max_episode_steps: 1000
  use_target_action_refine: True

  # CARLA启动配置
  carla_port: 2000
  carla_quality: Epic
  carla_offscreen: True

  # 结果输出目录
  results_root: ${hydra:runtime.cwd}/logs/gym-finetune/CarlaTown05_latestPerRun_eval

  # eval.py会使用该命名覆盖全局wandb命名
  wandb_project: gym-${env_name}-eval
  wandb_run_prefix: CarlaTown05_latestPerRun_eval
