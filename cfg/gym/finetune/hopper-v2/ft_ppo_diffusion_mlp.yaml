defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.train_ppo_diffusion_agent.TrainPPODiffusionAgent

name: ${env_name}_ppo_diffusion_mlp_ta${horizon_steps}_td${denoising_steps}_tdf${ft_denoising_steps}
logdir: ${hydra:runtime.cwd}/logs/gym-finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
#base_policy_path: ${oc.env:DPPO_LOG_DIR}/gym-pretrain/hopper-medium-v2_pre_diffusion_mlp_ta4_td20/2024-06-12_23-10-05/checkpoint/state_3000.pt
normalization_path: ${hydra:runtime.cwd}/logs/gym/${env_name}/normalization.npz

seed: 42
device: cuda:0
# 环境切换接口：默认 Town05 十字路口左转场景
# 也可命令行覆盖：python script/run.py carla_env_interface=CarlaTown05Cross-v0
carla_env_interface: CarlaTown05Cross-v0
# carla_env_interface: CarlaTown10Cross-v0
# carla_env_interface: carlaenv10-v0

env_name: ${carla_env_interface}
obs_dim: 128
action_dim: 2
denoising_steps: 20
ft_denoising_steps: 20
cond_steps: 1
horizon_steps: 1
act_steps: 1
memory_size: 200000  # number of trajectories
warm_up: 5000        # 与代码 explore_env(5000) 保持一致
tau: 0.005           # 修正：标准 SAC/TD3 值，0.05 过大会使 target 网络太不稳

env:
  n_envs: 1
  reward_scale: 0.01
  name: ${env_name}
  max_episode_steps: 1000
  reset_at_iteration: False
  save_video: False
  best_reward_threshold_for_success: 3  # success rate not relevant for gym tasks
  wrappers: {}   # ← 不用任何 wrapper

wandb:
  entity: 1150900229-
  project: gym-${env_name}-finetune1
  run: ${now:%H-%M-%S}_${name}

eval:
  # 评估脚本会将 cfg._target_ 强制切到该 Agent，确保只评估不训练
  agent_target: agent.eval_ppo_diffusion_agent.EvalPPODiffusionAgent
  # 批量 checkpoint 根目录（递归查找）
  checkpoint_root: ${hydra:runtime.cwd}/logs/gym-finetune/CarlaTown05Cross-v0_ppo_diffusion_mlp_ta1_td20_tdf20
  checkpoint_pattern: state_*.pt
  max_checkpoints: -1

  # 评估规模
  episodes_per_checkpoint: 500
  max_episode_steps: 1000
  use_target_action_refine: True

  # CARLA 启动参数
  carla_port: 2000
  carla_quality: Epic
  carla_offscreen: True

  # 输出目录（会自动创建子目录：${env_name}_eval500_时间戳）
  results_root: ${hydra:runtime.cwd}/logs/gym-finetune/CarlaTown05_eval_ppo_diffusion_mlp

  # wandb 命名（eval.py 会覆盖全局 wandb 配置）
  wandb_project: gym-${env_name}-eval
  wandb_run_prefix: CarlaTown05_eval500

train:
  n_train_itr: 2500
  n_critic_warmup_itr: 0
  n_steps: 2000
  gamma: 0.99
  actor_lr: 1e-4
  actor_weight_decay: 0
  actor_lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 10
    min_lr: 1e-4
  critic_lr: 1e-3
  critic_weight_decay: 0
  critic_lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 10
    min_lr: 1e-3
  save_model_freq: 20
  val_freq: 20
  render:
    freq: 1
    num: 0
  # PPO specific
  reward_scale_running: True
  reward_scale_const: 1.0
  gae_lambda: 0.95
  batch_size: 256      # 修正：64 过小，对 20000 total_steps 建议 256
  update_epochs: 5
  vf_coef: 0.5
  target_kl: 0.05      # 修正：1.0 使 early stop 失效，标准值 0.01~0.05
  critic_q_update_steps: 20  # Q网络每个iteration更新次数（标准off-policy建议10~50）




model:
  _target_: model.diffusion.diffusion_ppo.PPODiffusion
  # HP to tune
  gamma_denoising: 0.9   # 修正：0.99 对 10 步折扣仅 8% 差异；0.9 使步骤权重差异达 57%
  clip_vloss_coef: 0.5   # 新增：value function clip，防止 V 估计跳变过大
  action_lr: 0.003       # 修正：0.03 对动作优化过大，0.003 更稳定
  update_times: 20
  clip_ploss_coef: 0.01
  clip_ploss_coef_base: 0.1
  clip_ploss_coef_rate: 3
  randn_clip_value: 3
  min_sampling_denoising_std: 0.1
  min_logprob_denoising_std: 0.1
  gamma: 0.99
  nstep: 1
  params: {}
#  network_path: ${base_policy_path}
  max_grad_norm: 1
  actor:
    _target_: model.diffusion.mlp_diffusion.DiffusionMLP
    time_dim: 16
    mlp_dims: [512, 512, 512]
    activation_type: ReLU
    residual_style: True
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    horizon_steps: ${horizon_steps}
    action_dim: ${action_dim}
    action_steps: ${act_steps}

  critic:
    _target_: model.common.critic.DistributionalDoubleQ
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    action_dim: ${action_dim}
    action_steps: ${act_steps}
    mlp_dims: [256, 256, 256]
    activation_type: Mish
    residual_style: True
    v_min: -5  # 修正：0 无法表示碰撞负奖励（最坏 -0.03×episode），改为 -5
    v_max: 5
    num_atoms: 51
    device: ${device}


  ft_denoising_steps: ${ft_denoising_steps}
  horizon_steps: ${horizon_steps}
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  denoising_steps: ${denoising_steps}
  device: ${device}
  noise:
    type: 'mixed' # ['fixed', 'mixed']
    decay: null  #  "exp" and "linear"
    exp_decay_rate: 0.99
    lin_decay_iters: 10000
    std_max: 0.6
    std_min: 0.05
    tgt_pol_std: 0.8
    tgt_pol_noise_bound: 0.2




no_tgt_actor: True

exp:
  type: 'prop' # ['prop', 'fixed', 'linear']
  fix_ratio: 0.5
  stop_ratio: 0.7
  mode_embedding: False



distl: False
v_min: -5   # 与 model.critic.v_min 保持一致
v_max: 5
num_atoms: 51

cluster_threshold: null
use_downsampling: False
use_embedding: False
embedding_dim: 5
