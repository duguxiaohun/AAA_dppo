defaults:
  - eval_base
  - _self_

# 仅评估，不训练
_target_: agent.eval_ppo_diffusion_agent.EvalPPODiffusionAgent

# 环境选择：取消注释切换场景，或命令行覆盖
carla_env_interface: CarlaTown05Cross-v0
# carla_env_interface: CarlaTown10Cross-v0
# carla_env_interface: CarlaTown03Cross-v0
env_name: ${carla_env_interface}

# true=显示CARLA窗口及内部画面（评估默认）；false=纯后台运行
visualize: true

wandb:
  entity: 1150900229-
  project: gym-${env_name}-eval
  run: ${env_name}_latestPerRun_eval

eval:
  agent_target: agent.eval_ppo_diffusion_agent.EvalPPODiffusionAgent

  # 指向目标 checkpoint 目录（按需覆盖）
  # 示例：.../logs/gym-finetune/${name}/2026-05-22_14-36-16_42/checkpoint
  checkpoint_dir: ${hydra:runtime.cwd}/logs/gym-finetune/${name}/2026-05-29_11-43-53_42/checkpoint
  checkpoint_pattern: state_*.pt

  # -1 表示自动取目录里最后一个 ckpt
  checkpoint_step: -1

  # 每个ckpt评估回合数
  episodes_per_checkpoint: 500
  max_episode_steps: 1000
  use_target_action_refine: True

  # CARLA启动配置
  carla_port: 2000
  carla_quality: Epic
  carla_offscreen: True

  # 结果输出目录（与 env_name 关联）
  results_root: ${hydra:runtime.cwd}/logs/gym-eval/${env_name}_latestPerRun_eval

  # eval.py 会使用该命名覆盖全局 wandb 命名
  wandb_project: gym-${env_name}-eval
  wandb_run_prefix: ${env_name}_latestPerRun_eval
